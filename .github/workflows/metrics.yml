name: Metrics (split)

on:
  schedule: [{ cron: "0 12 */1 * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.base.svg
          user: YunTing-k
          template: classic
          base: activity, community, repositories, metadata
          base_indepth: yes
          config_display: columns
          config_timezone: Asia/Shanghai

      - name: Introduction
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.introduction.svg
          user: YunTing-k
          base: header
          config_display: columns
          config_timezone: Asia/Shanghai
          plugin_introduction: yes
          
      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.activity.svg
          user: YunTing-k
          base: ""
          config_display: columns
          config_timezone: Asia/Shanghai
          plugin_activity: yes
          plugin_activity_limit: 15
          plugin_activity_days: 365
          plugin_activity_visibility: all

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: YunTing-k
          base: ""
          config_display: large
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot, batchfile
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15

      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: YunTing-k
          base: ""
          config_display: columns
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
